name: Sync Webmentions

on:
    schedule:
        - cron: "17 */2 * * *"
    workflow_dispatch:

permissions:
    contents: write
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    sync:
        runs-on: ubuntu-latest
        outputs:
            changed: ${{ steps.commit.outputs.changed }}

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  ref: ${{ github.ref_name }}

            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.11"

            - name: Install Python dependencies
              run: |
                  python -m pip install --upgrade pip
                  if [[ -f _python/requirements.txt ]]; then
                    python -m pip install -r _python/requirements.txt
                  fi

            - name: Run webmention sync
              run: python _python/fetch_webmentions.py

            - name: Commit changes
              id: commit
              run: |
                  if [[ -z "$(git status --porcelain)" ]]; then
                    echo "No changes to commit."
                    echo "changed=false" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  git config user.name "GitHub Action"
                  git config user.email "action@github.com"
                  git add -A
                  git commit -m "Chore: sync webmentions $(date -u +%Y-%m-%dT%H:%M) [skip ci]"
                  git push origin HEAD:${GITHUB_REF_NAME}
                  echo "changed=true" >> "$GITHUB_OUTPUT"

    build:
        runs-on: ubuntu-latest
        needs: sync
        if: needs.sync.outputs.changed == 'true'
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  ref: ${{ github.ref_name }}
            - name: Set up Ruby
              uses: ruby/setup-ruby@v1
              with:
                ruby-version: '3.2'
            - name: Install Bundler
              run: gem install bundler
            - name: Install dependencies
              run: bundle install --jobs 4 --retry 3
            - name: Build with Jekyll
              run: bundle exec jekyll build
            - name: Upload artifact
              uses: actions/upload-pages-artifact@v5

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5
